<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海鸭蛋毕业科室分配系统 2.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 520px; }
        .card {
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 50px rgba(25, 118, 210, 0.18);
            padding: 40px 32px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(20px);
        }
        .card.show { opacity: 1; transform: translateY(0); }
        .card.hide { opacity: 0; transform: translateY(-20px); }

        .icon { font-size: 68px; margin-bottom: 24px; animation: bounce 2.2s ease-in-out infinite; }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        h1 { color: #1565c0; font-size: 1.85em; margin-bottom: 16px; line-height: 1.4; }
        .subtitle { color: #555; font-size: 0.98em; margin-bottom: 32px; line-height: 1.7; }

        .progress {
            width: 100%; height: 7px; background: #e3f2fd; border-radius: 4px;
            margin-bottom: 28px; overflow: hidden;
        }
        .progress-bar {
            height: 100%; background: linear-gradient(90deg, #42a5f5, #1565c0);
            border-radius: 4px; transition: width 0.6s ease;
        }

        .question {
            font-size: 1.32em; color: #222; margin-bottom: 32px;
            font-weight: 500; line-height: 1.5;
        }

        .options { display: flex; flex-direction: column; gap: 14px; }
        .option-btn {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            padding: 18px 26px;
            font-size: 1.08em;
            color: #333;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            text-align: left;
        }
        .option-btn:hover {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border-color: #42a5f5;
            transform: translateX(8px);
        }

        .result-icon { font-size: 88px; margin-bottom: 24px; animation: celebrate 0.6s ease; }
        @keyframes celebrate { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

        .result-title { font-size: 2.1em; color: #1565c0; margin-bottom: 12px; font-weight: bold; }
        .result-subtitle {
            font-size: 1.15em; color: #0d47a1; margin-bottom: 28px;
            padding: 12px 28px; background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border-radius: 30px; display: inline-block;
        }
        .result-comment {
            color: #444; font-size: 1.08em; line-height: 1.85;
            margin-bottom: 32px; padding: 24px;
            background: #fff8e1; border-radius: 16px;
            border-left: 5px solid #ffc107; text-align: left;
        }

        .action-btn {
            background: linear-gradient(135deg, #42a5f5, #1565c0);
            color: white; border: none; border-radius: 30px;
            padding: 16px 48px; font-size: 1.12em; cursor: pointer;
            transition: all 0.3s ease; font-family: inherit; font-weight: 500;
        }
        .action-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(21, 101, 192, 0.35); }

        .back-btn {
            margin-top: 20px; background: none; border: 2px solid #bbb;
            color: #666; padding: 10px 24px; border-radius: 30px; font-size: 0.95em;
            cursor: pointer;
        }

        .footer { margin-top: 28px; color: #999; font-size: 0.86em; }
    </style>
</head>

        const results = {

        let currentQuestion = 0;
        let history = [];

        function renderCard(content) {
            const card = document.getElementById('card');
            card.classList.remove('show');
            card.classList.add('hide');
            setTimeout(() => {
                card.innerHTML = content;
                card.classList.remove('hide');
                card.classList.add('show');
            }, 300);
        }

        function calculateProgress() {
            return Math.min((history.length / 10) * 100, 100);
        }

        function renderStart() {
            const content = `
                <div class="icon">🏥</div>
                <h1>海鸭蛋科室契合度测试 2.0</h1>
                <p class="subtitle">
                    还在纠结毕业选哪个科室？<br>
                    来测测看，也许能给你一点灵感！<br>
                    <small>（纯属娱乐，别当真投简历）</small>
                </p>
                <button class="action-btn" onclick="startTest()">我要进科室！</button>
                <p class="footer">结果仅供参考，人生自己掌控</p>
            `;
            renderCard(content);
        }

        function renderQuestion(id) {
            const q = questions.find(item => item.id === id);
            if (!q) return;

            const progress = calculateProgress();

            let optionsHtml = q.options.map(opt => {
                const nextVal = typeof opt.next === 'string' ? `'${opt.next}'` : opt.next;
                return `<button class="option-btn" onclick="selectOption(${nextVal})">${opt.text}</button>`;
            }).join('');

            const content = `
                <div class="progress"><div class="progress-bar" style="width: ${progress}%"></div></div>
                <div class="icon">${q.icon}</div>
                <p class="question">${q.question}</p>
                <div class="options">${optionsHtml}</div>
                ${history.length > 0 ? `<button class="back-btn" onclick="goBack()">← 返回上一题</button>` : ''}
            `;
            renderCard(content);
        }

        function renderResult(department) {
            const result = results[department];
            if (!result) return;

            const content = `
                <div class="result-icon">${result.icon}</div>
                <h1 class="result-title">你的命中注定科室是</h1>
                <div class="result-subtitle">${result.title}</div>
                <div class="result-comment">${result.comment}</div>
                <button class="action-btn" onclick="restartTest()">🔄 再测一次</button>
                <p class="footer">结果仅供参考<br>先把期末考过再说吧～</p>
            `;
            renderCard(content);
        }

        function startTest() {
            currentQuestion = 1;
            history = [];
            renderQuestion(1);
        }

        function selectOption(next) {
            history.push(currentQuestion);
            if (typeof next === 'number') {
                currentQuestion = next;
                renderQuestion(next);
            } else if (typeof next === 'string') {
                renderResult(next);
            }
        }

        function goBack() {
            if (history.length === 0) return;
            currentQuestion = history.pop();
            renderQuestion(currentQuestion);
        }

        function restartTest() {
            currentQuestion = 0;
            history = [];
            renderStart();
        }

        // 初始化
        renderStart();
    </script>
</body>
</html>

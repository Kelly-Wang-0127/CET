                comment: "冷静专业的你，适合和‘心’打交道。心梗、心衰、心律失常……你需要快速决策，同时给患者和家属信心。这里压力不小，但成就感也爆棚。" },
            "呼吸科": { icon: "🫁", title: "呼吸科", subtitle: "氧气供应站",
                comment: "能接受各种体液的你，适合呼吸科。肺炎、慢阻肺、肺癌……你会成为患者呼吸顺畅的守护者。疫情期间你可能会很忙，提前做好心理建设。" },
            "肿瘤科": { icon: "🎗️", title: "肿瘤科", subtitle: "抗癌战士",
                comment: "能接受死亡话题的你，内心强大。肿瘤科需要你不仅治病，还要治心。患者和家属的情绪管理是日常，加油，你能带给他们希望。" },
            "口腔科": { icon: "🦷", title: "口腔科", subtitle: "牙齿美容师",
                comment: "不喜欢被患者拉着聊一小时的你，适合口腔科。这里患者大多张着嘴，你可以少听废话，多干实事。拔牙、种牙、矫正，技术活儿拉满。" },
            "整形外科": { icon: "✂️", title: "整形外科", subtitle: "美学创造者",
                comment: "对手术后‘美’有追求的你，来整形外科准没错。这里不仅要治病，还要让患者变美。记住：刀下留情，审美在线。" },
            "中医科": { icon: "🌿", title: "中医科", subtitle: "整体观·辨证施治",
                comment: "你对传统医学有天然的亲切感，喜欢从整体看问题，而不是头痛医头脚痛医脚。中医科需要耐心、细致的望闻问切，还得能跟患者聊聊生活习惯和情绪。你这种‘不急不躁’的性格，在这里会很有用武之地。不过，记得把西医知识也学扎实，别被老教授们卷到怀疑人生～" },
            "临床恶人": { icon: "？", title: "临床恶人", subtitle: "你是？",
                comment: "请速度联系长海医院医学心理科，准备办理休学手续。" }
        };

        let currentQuestion = 0;
        let history = [];
        let answeredCount = 0;

        function renderCard(content) {
            const card = document.getElementById('card');
            card.classList.remove('show');
            setTimeout(() => {
                card.innerHTML = content;
                card.classList.add('show');
            }, 300);
        }

        function calculateProgress() {
            return Math.min(Math.round((answeredCount / 13) * 100), 100);
        }

        function renderStart() {
            const content = `
                <div class="icon">🏥</div>
                <h1>海鸭蛋天选科室分配系统 1.0</h1>
                <p class="subtitle">
                    不知道去哪个科室<br>
                    来测测看，你的天选之地！<br>
                </p>
                <button class="action-btn" onclick="startTest()">上临床咯</button>
                <p class="footer">结果仅供鱼乐，人生方向自己决定</p>
            `;
            renderCard(content);
        }

        function renderQuestion(id) {
            const q = questions.find(item => item.id === id);
            if (!q) return;

            const progress = calculateProgress();

            let optionsHtml = q.options.map(opt => {
                const nextVal = typeof opt.next === 'string' ? `'${opt.next}'` : opt.next;
                return `<button class="option-btn" onclick="selectOption(${nextVal})">${opt.text}</button>`;
            }).join('');

            const content = `
                <div class="progress-container">
                    <div class="progress"><div class="progress-bar" style="width: ${progress}%"></div></div>
                    <div class="progress-text">${progress}% · 已回答 ${answeredCount} 题</div>
                </div>
                <div class="icon">${q.icon}</div>
                <p class="question">${q.question}</p>
                <div class="options">${optionsHtml}</div>
                ${history.length > 0 ? `<button class="back-btn" onclick="goBack()">← 返回上一题</button>` : ''}
            `;
            renderCard(content);
        }

        function renderResult(department) {
            const result = results[department] || results["内科"];
            const match = Math.floor(Math.random() * 20) + 75;

            const content = `
                <div class="result-icon">${result.icon}</div>
                <h1 class="result-title">你的命中注定科室是</h1>
                <div class="match-tag">匹配度 ${match}% 🔥</div>
                <div class="result-subtitle">${result.title}</div>
                <div class="result-comment">${result.comment}</div>
                <button class="action-btn" onclick="restartTest()">🔄 再测一次</button>
                <p class="footer">别当真了<br>先把期末考过了再说吧～</p>
            `;
            renderCard(content);
        }

        function startTest() {
            currentQuestion = 1;
            history = [];
            answeredCount = 0;
            renderQuestion(1);
        }

        function selectOption(next) {
            history.push(currentQuestion);
            answeredCount++;

            if (typeof next === 'number') {
                currentQuestion = next;
                renderQuestion(next);
            } else if (typeof next === 'string') {
                renderResult(next);
            }
        }

        function goBack() {
            if (history.length === 0) return;
            answeredCount--;
            currentQuestion = history.pop();
            renderQuestion(currentQuestion);
        }

        function restartTest() {
            currentQuestion = 0;
            history = [];
            answeredCount = 0;
            renderStart();
        }

        // 初始化
        renderStart();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMUTI-24 医学生科室相性倾向测评</title>
    <style>
        body { 
            font-family: "Microsoft YaHei", system-ui, sans-serif; 
            background: linear-gradient(135deg, #f0f7ff, #e6f0fa); 
            margin: 0; 
            padding: 20px; 
            color: #333; 
        }
        .container { 
            max-width: 960px; 
            margin: 0 auto; 
            background: white; 
            border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.12); 
            overflow: hidden; 
        }
        header { 
            background: linear-gradient(90deg, #1e88e5, #1565c0); 
            color: white; 
            padding: 40px 30px; 
            text-align: center; 
        }
        h1 { margin: 0; font-size: 32px; }
        .subtitle { opacity: 0.95; font-size: 17px; margin-top: 10px; }

        /* 欢迎页面 */
        #welcome-page {
            padding: 60px 40px;
            text-align: center;
        }
        #welcome-page h2 {
            color: #1565c0;
            font-size: 26px;
            margin-bottom: 20px;
        }
        #welcome-page p {
            font-size: 17px;
            line-height: 1.7;
            color: #555;
            max-width: 680px;
            margin: 0 auto 40px;
        }
        .start-btn {
            background: #1565c0;
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 19px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .start-btn:hover {
            background: #0d47a1;
            transform: translateY(-2px);
        }

        .section { padding: 30px; }
        .progress { 
            height: 8px; 
            background: #bbdefb; 
            margin: 20px 0; 
            border-radius: 4px; 
            overflow: hidden; 
        }
        .progress-bar { 
            height: 100%; 
            background: linear-gradient(90deg, #1e88e5, #1565c0); 
            width: 0%; 
            transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }
        .progress-text {
            text-align: center;
            color: #666;
            font-size: 15px;
            margin-bottom: 10px;
        }

        .dimension h2 { 
            color: #1565c0; 
            border-bottom: 2px solid #bbdefb; 
            padding-bottom: 12px; 
            font-size: 22px;
        }
        .question { 
            margin-bottom: 30px; 
            padding: 24px; 
            background: #f8fbff; 
            border-radius: 14px; 
            border-left: 6px solid #1e88e5; 
        }
        .question label { 
            display: block; 
            margin-bottom: 20px; 
            font-weight: 500; 
            font-size: 17px;
            line-height: 1.6;
        }
        .options { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        .option { 
            padding: 16px 20px; 
            background: white; 
            border: 2px solid #e0e0e0; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 16px;
        }
        .option:hover { 
            border-color: #1e88e5; 
            background: #f0f7ff;
            transform: translateX(4px);
        }
        .option.selected { 
            background: #e3f2fd; 
            border-color: #1565c0; 
            color: #1565c0; 
            font-weight: 600; 
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(21, 101, 192, 0.15);
        }

        button { 
            background: #1565c0; 
            color: white; 
            border: none; 
            padding: 14px 36px; 
            font-size: 17px; 
            border-radius: 10px; 
            cursor: pointer; 
            margin: 10px 8px;
            transition: all 0.2s;
        }
        button:hover { background: #0d47a1; }
        button:disabled { background: #aaa; cursor: not-allowed; }

        .result { display: none; padding: 40px 30px; }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin: 25px 0; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        th, td { 
            padding: 14px; 
            text-align: left; 
            border: 1px solid #ddd; 
        }
        th { 
            background: #e3f2fd; 
            font-weight: 600;
        }
        .recommend { 
            background: #e8f5e9; 
            padding: 22px; 
            border-radius: 12px; 
            margin: 18px 0; 
            border-left: 6px solid #4caf50; 
        }
        .dept-name {
            font-size: 19px;
            margin: 8px 0 12px 0;
        }
        .distance { 
            font-size: 15px; 
            color: #555; 
            margin-top: 8px;
        }
        .warning {
            background: #fff3e0;
            padding: 18px;
            border-radius: 10px;
            border-left: 6px solid #ff9800;
            margin: 25px 0;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- 欢迎页面 -->
        <div id="welcome-page">
            <h1>📌 NMUTI-24</h1>
            <p class="subtitle">医学生六维职业契合度测评系统（PRO版）</p>
            
            <h2>欢迎使用本测评工具</h2>
            <p>
                这是一套医学生版的MBTI，周四V我50直通心愿科室。<br>
                通过24道精心设计的题目，我们将从<strong>决断力、共情力、细节敏感、抗压能力、学术钻研、沟通协调</strong>六个维度全面刻画你的性格画像。<br><br>
                不过如果你真信这玩意儿，建议还是早点洗洗睡吧。
            </p>
            <button class="start-btn" onclick="startTest()">开始测评</button>
        </div>

        <!-- 测评页面 -->
        <div id="test-page" class="section" style="display: none;">
            <div class="progress-text">
                已完成 <span id="progress-text">0</span>/24 题
            </div>
            <div class="progress"><div id="progress-bar" class="progress-bar"></div></div>

            <div id="questions"></div>

            <div style="text-align:center; margin-top: 30px;">
                <button id="prev-btn" onclick="prevQuestion()" style="display:none;">← 上一步</button>
                <button id="next-btn" onclick="nextQuestion()" style="display:none;">下一步 →</button>
            </div>
        </div>

        <!-- 结果页面 -->
        <div id="result-page" class="result">
            <h2 style="color:#1565c0; text-align:center;">🎯 您的测评结果</h2>
            
            <div id="score-summary" style="margin:30px 0; font-size:18px; line-height:1.7;"></div>

            <h3>📊 您的六维得分（满分20分）</h3>
            <table id="score-table">
                <thead>
                    <tr>
                        <th>维度</th>
                        <th>得分</th>
                        <th>描述</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <h3>🏥 最匹配的三个科室推荐</h3>
            <div id="recommendations"></div>

            <div class="warning">
                ⚠️ 测评仅供参考，实际职业选择还需结合个人兴趣、身体条件、家庭因素及就业市场综合考虑。
            </div>

            <div style="text-align:center; margin-top:50px;">
                <button onclick="restartTest()" style="background:#ff9800; padding:14px 40px;">重新测评</button>
            </div>
        </div>
    </div>

    <script>
        // 24道题目（保持不变）
        const questions = [
            { id:1, dim:"DER", q:"遇到突发紧急情况时，我通常是第一个站出来制定计划的人，而不是等待指示。" },
            { id:2, dim:"DER", q:"即使在信息不充分的情况下，我也能快速拍板做决定，并敢于承担后果。" },
            { id:3, dim:"DER", q:"在混乱嘈杂、多线并行的环境中（如车祸现场或急救室），我反而能保持头脑清醒。" },
            { id:4, dim:"DER", q:"我倾向于“先行动控制局面，再复盘分析细节”，而不是“没想清楚绝对不行动”。" },

            { id:5, dim:"EHC", q:"当朋友倾诉痛苦时，我很容易感同身受，甚至会因为他们的遭遇而情绪低落。" },
            { id:6, dim:"EHC", q:"我认为安抚患者的情绪、解释病情，与开出正确的处方同等重要。" },
            { id:7, dim:"EHC", q:"我能敏锐地察觉到陌生人非语言的微表情或肢体动作所传达的不安与焦虑。" },
            { id:8, dim:"EHC", q:"即使工作很忙，我也愿意多花几分钟倾听患者与疾病无关的“牢骚”或家庭背景。" },

            { id:9, dim:"PDO", q:"我非常享受拼图、模型制作或外科打结等需要长时间极度专注和手眼协调的活动。" },
            { id:10,dim:"PDO", q:"在阅读冗长的文件或报告时，我总能一眼发现别人容易忽略的微小错漏。" },
            { id:11,dim:"PDO", q:"我可以在显微镜下或盯着狭小视野进行连续数小时的操作，而不会感到极度烦躁。" },
            { id:12,dim:"PDO", q:"我有强烈的“强迫症”，喜欢严格按照SOP（标准作业程序）和核对表做事。" },

            { id:13,dim:"SHT", q:"即使连续熬夜、睡眠严重不足，我的情绪依然相对平稳，不会轻易暴躁。" },
            { id:14,dim:"SHT", q:"面对不可挽回的挫折（如尽力后依然失败），我能迅速调整心态，不长期内耗。" },
            { id:15,dim:"SHT", q:"我的身体素质很好，能够适应黑白颠倒的夜班和不规律的饮食节奏。" },
            { id:16,dim:"SHT", q:"我能很好地将工作中的负面情绪（如见证生老病死）与个人生活剥离开来。" },

            { id:17,dim:"ALR", q:"相比于直接得到答案，我更享受为了一个罕见现象去翻阅大量文献的过程。" },
            { id:18,dim:"ALR", q:"我喜欢玩逻辑推理游戏或看悬疑小说，擅长从纷繁复杂的线索中推导出真相。" },
            { id:19,dim:"ALR", q:"对于疾病的底层分子机制或病理生理学基础，我有着强烈的探究欲。" },
            { id:20,dim:"ALR", q:"我对参与临床试验、撰写论文或进行基础科学研究充满热情。" },

            { id:21,dim:"CSI", q:"在团队协作中，我通常担任协调者，擅长化解成员间的冲突并合理分配任务。" },
            { id:22,dim:"CSI", q:"面对脾气暴躁或固执的人，我依然有耐心且有策略地说服他们。" },
            { id:23,dim:"CSI", q:"我非常享受与不同背景、不同专业的人（如其他科室、护士、家属）跨部门协作。" },
            { id:24,dim:"CSI", q:"在面对无理取闹或医患纠纷苗头时，我懂得如何用沟通技巧“降温”和化解危机。" }
        ];

        // 科室库（已统一添加英文缩写）
        const departments = [
            { name: "急诊科", abbr: "ED",          der:20, ehc:10, pdo:14, sht:20, alr:13, csi:15 },
            { name: "重症医学", abbr: "ICU",       der:19, ehc:8,  pdo:16, sht:20, alr:16, csi:14 },
            { name: "普通外科", abbr: "GS",        der:18, ehc:10, pdo:17, sht:18, alr:12, csi:12 },
            { name: "骨科", abbr: "Ortho",         der:17, ehc:9,  pdo:15, sht:19, alr:11, csi:12 },
            { name: "妇产科", abbr: "OB/GYN",      der:18, ehc:14, pdo:16, sht:19, alr:11, csi:15 },
            { name: "麻醉科", abbr: "Anesth",      der:18, ehc:6,  pdo:17, sht:17, alr:15, csi:10 },
            { name: "心血管内科", abbr: "Cardio",  der:16, ehc:12, pdo:16, sht:17, alr:17, csi:14 },
            { name: "神经内科", abbr: "Neuro",     der:10, ehc:14, pdo:16, sht:12, alr:19, csi:14 },
            { name: "肿瘤内科", abbr: "Onco",      der:11, ehc:18, pdo:14, sht:16, alr:18, csi:16 },
            { name: "儿科", abbr: "Peds",          der:14, ehc:20, pdo:12, sht:16, alr:12, csi:18 },
            { name: "精神科", abbr: "Psych",       der:8,  ehc:18, pdo:8,  sht:12, alr:16, csi:18 },
            { name: "全科医学", abbr: "FM",        der:12, ehc:16, pdo:12, sht:10, alr:12, csi:20 },
            { name: "眼科/显微外科", abbr: "Ophth", der:13, ehc:11, pdo:20, sht:12, alr:14, csi:12 },
            { name: "皮肤科", abbr: "Derm",        der:10, ehc:12, pdo:18, sht:8,  alr:14, csi:14 },
            { name: "病理科", abbr: "Path",        der:8,  ehc:6,  pdo:19, sht:10, alr:19, csi:6  },
            
            // 新增科室
            { name: "中医科", abbr: "TCM",         der:9,  ehc:16, pdo:14, sht:11, alr:17, csi:15 },
            { name: "预防医学", abbr: "PrevMed",   der:7,  ehc:12, pdo:13, sht:9,  alr:18, csi:14 },
            { name: "医学影像科", abbr: "Radiology", der:6, ehc:5,  pdo:19, sht:8,  alr:16, csi:7  },
            { name: "康复医学科", abbr: "Rehab",   der:11, ehc:17, pdo:15, sht:13, alr:14, csi:16 },
            
            // 隐蔽科室
            { name: "空降行政岗", abbr: "Admin",   der:0,  ehc:0,  pdo:0,  sht:0,  alr:0,  csi:0  }
        ];

        let answers = new Array(24).fill(0);
        let currentQuestion = 0;

        const dimNames = {
            DER: "决断与应急响应 (DER)",
            EHC: "共情与人文关怀 (EHC)",
            PDO: "精细操作与细节敏感 (PDO)",
            SHT: "抗压与高负荷耐受 (SHT)",
            ALR: "逻辑推理与学术钻研 (ALR)",
            CSI: "沟通与统筹协调 (CSI)"
        };

        function startTest() {
            document.getElementById("welcome-page").style.display = "none";
            document.getElementById("test-page").style.display = "block";
            renderQuestion();
        }

        function renderQuestion() {
            const qContainer = document.getElementById("questions");
            qContainer.innerHTML = "";

            const q = questions[currentQuestion];
            const html = `
                <div class="dimension">
                    <h2>第 ${currentQuestion + 1} 题 / 24</h2>
                    <div class="question">
                        <label>${q.q}</label>
                        <div class="options" id="options-${q.id}">
                            ${[1,2,3,4,5].map(score => `
                                <div class="option ${answers[q.id-1] === score ? 'selected' : ''}" 
                                     onclick="selectAnswer(${q.id}, ${score});">
                                    ${score} 分 —— ${getOptionDesc(score)}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            qContainer.innerHTML = html;

            document.getElementById("prev-btn").style.display = currentQuestion === 0 ? "none" : "inline-block";
            document.getElementById("next-btn").style.display = currentQuestion === 23 ? "none" : "inline-block";

            const progress = ((currentQuestion + 1) / 24) * 100;
            document.getElementById("progress-bar").style.width = `${progress}%`;
            document.getElementById("progress-text").textContent = currentQuestion + 1;
        }

        function getOptionDesc(score) {
            const desc = ["完全不符合", "较不符合", "一般符合", "比较符合", "完全符合"];
            return desc[score - 1];
        }

        function selectAnswer(qid, score) {
            answers[qid - 1] = score;
            
            // 立即显示选中状态
            const options = document.querySelectorAll(`#options-${qid} .option`);
            options.forEach(opt => {
                opt.classList.toggle('selected', parseInt(opt.getAttribute('onclick').match(/\d+/)[0]) === score);
            });

            // 提升流畅度的自动跳转
            setTimeout(() => {
                if (currentQuestion < 23) {
                    currentQuestion++;
                    renderQuestion();
                } else {
                    calculateResult();
                }
            }, 180);   // 优化为180ms，更丝滑
        }

        function nextQuestion() {
            if (currentQuestion < 23) {
                currentQuestion++;
                renderQuestion();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }

        function calculateScores() {
            const scores = { DER:0, EHC:0, PDO:0, SHT:0, ALR:0, CSI:0 };
            questions.forEach((q, index) => {
                scores[q.dim] += answers[index];
            });
            return scores;
        }

        function euclideanDistance(user, dept) {
            return Math.sqrt(
                Math.pow(user.DER - dept.der, 2) +
                Math.pow(user.EHC - dept.ehc, 2) +
                Math.pow(user.PDO - dept.pdo, 2) +
                Math.pow(user.SHT - dept.sht, 2) +
                Math.pow(user.ALR - dept.alr, 2) +
                Math.pow(user.CSI - dept.csi, 2)
            );
        }

        function calculateResult() {
            if (answers.includes(0)) {
                alert("请完成所有题目后再查看结果！");
                return;
            }

            const userScores = calculateScores();

            const results = departments.map(dept => {
                const dist = euclideanDistance(userScores, dept);
                return { ...dept, distance: dist };
            }).sort((a, b) => a.distance - b.distance);

            document.getElementById("test-page").style.display = "none";
            document.getElementById("result-page").style.display = "block";

            // 得分表格
            let scoreHTML = "";
            Object.keys(userScores).forEach(dim => {
                scoreHTML += `
                    <tr>
                        <td><strong>${dimNames[dim]}</strong></td>
                        <td style="font-size:24px; font-weight:bold; color:#1565c0;">${userScores[dim]}</td>
                        <td>满分20分</td>
                    </tr>
                `;
            });
            document.getElementById("score-table").querySelector("tbody").innerHTML = scoreHTML;

            // 推荐科室（显示中文 + 英文缩写）
            let recHTML = "";
            for (let i = 0; i < 3; i++) {
                const r = results[i];
                recHTML += `
                    <div class="recommend">
                        <h3 class="dept-name">🥇 第 ${i+1} 推荐：${r.name} <strong>(${r.abbr})</strong></h3>
                        <p class="distance">多维距离：${r.distance.toFixed(2)}（数值越小，匹配度越高）</p>
                        <p><strong>匹配分析：</strong>懒得写了，等下次想起来再写。</p>
                    </div>
                `;
            }
            document.getElementById("recommendations").innerHTML = recHTML;

            const typeDesc = (userScores.DER > 14 && userScores.SHT > 14) ? "高决断高抗压型" :
                             (userScores.EHC > 15 && userScores.CSI > 15) ? "高共情高沟通型" : "均衡发展型";
            document.getElementById("score-summary").innerHTML = `
                <p>您的性格画像整体偏向<strong>${typeDesc}</strong>。<br>
                系统已根据六维欧几里得距离为您计算出最适合的执业方向。以下三个科室是当前最优推荐。</p>
            `;
        }

        function restartTest() {
            answers = new Array(24).fill(0);
            currentQuestion = 0;
            document.getElementById("result-page").style.display = "none";
            document.getElementById("welcome-page").style.display = "block";
        }
    </script>
</body>
</html>

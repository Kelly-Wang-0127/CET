<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海鸭蛋毕业科室分配系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(25, 118, 210, 0.15);
            padding: 40px 30px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(20px);
        }

        .card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .card.hide {
            opacity: 0;
            transform: translateY(-20px);
        }

        .icon {
            font-size: 64px;
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            color: #1565c0;
            font-size: 1.8em;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .subtitle {
            color: #666;
            font-size: 0.95em;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .progress {
            width: 100%;
            height: 6px;
            background: #e3f2fd;
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #42a5f5, #1565c0);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .question {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 30px;
            font-weight: 500;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 16px 24px;
            font-size: 1.05em;
            color: #333;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .option-btn:hover {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border-color: #42a5f5;
            transform: translateX(5px);
        }

        .option-btn:active {
            transform: scale(0.98);
        }

        .result-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .result-title {
            font-size: 2em;
            color: #1565c0;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .result-subtitle {
            font-size: 1.1em;
            color: #0d47a1;
            margin-bottom: 25px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border-radius: 30px;
            display: inline-block;
        }

        .result-comment {
            color: #555;
            font-size: 1.1em;
            line-height: 1.8;
            margin-bottom: 30px;
            padding: 20px;
            background: #fff8e1;
            border-radius: 12px;
            border-left: 4px solid #ffc107;
            text-align: left;
        }

        .action-btn {
            background: linear-gradient(135deg, #42a5f5, #1565c0);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 16px 40px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            font-weight: 500;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(21, 101, 192, 0.3);
        }

        .footer {
            margin-top: 25px;
            color: #999;
            font-size: 0.85em;
        }

        @keyframes celebrate {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .celebrate {
            animation: celebrate 0.5s ease;
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.5em;
            }
            .question {
                font-size: 1.15em;
            }
            .option-btn {
                padding: 14px 20px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" id="card">
            <!-- 内容由JS动态填充 -->
        </div>
    </div>

    <script>
        const questions = [
            {
                id: 1,
                question: "当你在医院实习时，你的状态是？",
                icon: "🤔",
                options: [
                    { text: "疯狂模式开启", next: 2 },
                    { text: "理智在线", next: 3 }
                ]
            },
            {
                id: 2,
                question: "你的注意力属于哪种类型？",
                icon: "👀",
                options: [
                    { text: "超级集中，能盯一件事一整天", next: "精神科" },
                    { text: "注意力分散，三秒就神游", next: "急诊科" }
                ]
            },
            {
                id: 3,
                question: "作为医学生，你的学习态度是？",
                icon: "📚",
                options: [
                    { text: "卷王本王，卷到飞起", next: 4 },
                    { text: "能躺着绝不坐着", next: 7 }
                ]
            },
            {
                id: 4,
                question: "你的性格脾气怎么样？",
                icon: "😤",
                options: [
                    { text: "温润如玉，人间小天使", next: 5 },
                    { text: "一点就炸，行走炸药包", next: 6 },
                    { text: "不好不坏，普通人一个", next: 10 }
                ]
            },
            {
                id: 5,
                question: "你喜欢和什么年龄段的人打交道？",
                icon: "👶👴",
                options: [
                    { text: "成熟稳重的成年人", next: "内科" },
                    { text: "可爱的小朋友", next: "儿科" },
                    { text: "无所谓，活着就行", next: 5.5 }
                ]
            },
            {
                id: 5.5,
                question: "那你有洁癖吗？",
                icon: "🧹",
                options: [
                    { text: "房间乱成狗窝也能住", next: "妇产科" },
                    { text: "一尘不染是我的底线", next: "家庭医生（全科医学）" }
                ]
            },
            {
                id: 6,
                question: "你喜欢做什么类型的操作？",
                icon: "🔪",
                options: [
                    { text: "大刀阔斧，粗犷豪放", next: "普外科" },
                    { text: "精雕细琢，显微镜级别", next: "神经外科" }
                ]
            },
            {
                id: 7,
                question: "你喜欢热闹还是安静？",
                icon: "🎉",
                options: [
                    { text: "社交达人，人越多越嗨", next: 8 },
                    { text: "社恐本恐，享受独处", next: 9 }
                ]
            },
            {
                id: 8,
                question: "你觉得自己是哪种类型？",
                icon: "💪",
                options: [
                    { text: "敢想敢干，行动派", next: 8.5 },
                    { text: "保守务实，求稳第一", next: 8.6 }
                ]
            },
            {
                id: 8.5,
                question: "你的身体素质如何？",
                icon: "🏋️",
                options: [
                    { text: "健身达人，扛得动大腿", next: "骨科" },
                    { text: "手无缚鸡之力", next: "皮肤科" }
                ]
            },
            {
                id: 8.6,
                question: "你更偏好什么颜色？",
                icon: "🎨",
                options: [
                    { text: "红色系（热情张扬）", next: "耳鼻喉科" },
                    { text: "黑色系（神秘深邃）", next: "眼科" },
                    { text: "黄色系（明亮活力）", next: "泌尿外科" }
                ]
            },
            {
                id: 9,
                question: "你更喜欢什么光线环境？",
                icon: "💡",
                options: [
                    { text: "喜欢黑暗，越暗越舒服", next: "影像科" },
                    { text: "喜欢明亮，越亮越精神", next: "检验科" }
                ]
            },
            {
                id: 10,
                question: "当你在手术室观摩时，你在干嘛？",
                icon: "😴",
                options: [
                    { text: "目不转睛盯着手术台", next: 10.5 },
                    { text: "站着都能睡着", next: "麻醉科" },
                    { text: "研究这个病人能活多久", next: "病理科" }
                ]
            },
            {
                id: 10.5,
                question: "那你对瘫痪病人的态度是？",
                icon: "🧠",
                options: [
                    { text: "迟钝一点也行，活着就好", next: "神经内科" },
                    { text: "特别敏感，关注每一个细节", next: "康复医学科" }
                ]
            }
        ];

        const results = {
            "精神科": {
                icon: "🧠",
                title: "长征/长海-医学心理科",
                subtitle: "专注力·情绪稳定",
                comment: "你能长时间专注于一件事，这种超强的注意力正是心理科医生听患者哭诉两小时最需要的品质。面对各种来自地外空间的穿越，你能够保持冷静、耐心倾听，成为他们心灵的港湾。不过，小心暴露你的类人身份！"
            },
            "急诊科": {
                icon: "🚑",
                title: "野战急诊科",
                subtitle: "多任务处理·时间管理",
                comment: "你的注意力虽然分散，但这恰恰是急诊科的必备技能！在这里，你需要同时处理多个病人、多个问题，切换自如的你简直是急诊科的天选之人。就是记得喝咖啡续命！"
            },
            "内科": {
                icon: "💊",
                title: "内科",
                subtitle: "慢性病管理·问诊",
                comment: "温润如玉的你能耐心倾听每一位患者的病史，问诊时间平均1小时起步。你的温柔和耐心会让内科患者感受到家的温暖，就是门诊挂号费可能需要涨一点～"
            },
            "儿科": {
                icon: "👶",
                title: "儿科",
                subtitle: "哄娃专家",
                comment: "喜欢小朋友的你，简直是天生的小儿科医生！不过要有心理准备——你的患者可能会在你问诊时大哭大嚎，在你看病时满地乱爬，在家长身后捉迷藏...勇敢牛牛，不怕困难！"
            },
            "妇产科": {
                icon: "🤰",
                title: "妇产科",
                subtitle: "新生命迎接者·妇科圣手",
                comment: "对生活品质没有太高要求的你，非常适合妇产科的高强度工作！这里的节奏快、压力大，但每当听到新生儿的第一声啼哭，你会觉得一切都值得。加油！"
            },
            "家庭医生（全科医学）": {
                icon: "🏠",
                title: "全科医学",
                subtitle: "全能·社区健康",
                comment: "有洁癖的你追求完美，非常适合全科医学！作为社区居民的健康第一接触点，你需要有整洁有序的工作习惯。你的存在，就是居民健康的定心丸！"
            },
            "普外科": {
                icon: "🔪",
                title: "普外科",
                subtitle: "神之手·刀法豪放",
                comment: "粗犷豪放的性格让你在普外科如鱼得水！切得快、缝得快、术后恢复更快。不过记得温柔一点，毕竟患者不是猪肉～"
            },
            "神经外科": {
                icon: "🧠",
                title: "神经外科",
                subtitle: "显微手艺人",
                comment: "精雕细琢的你简直是神经外科的天才！在直径几毫米的血管上缝合是你的日常，手抖0.1毫米就是医疗事故...放心，你的手比机器人还稳！"
            },
            "骨科": {
                icon: "🦴",
                title: "骨科",
                subtitle: "力量型·装修工",
                comment: "健壮的你简直是骨科的标配！搬大腿、拉锯子、扛锤子...这是正经医疗操作，不是装修施工。不过记得保护好你的腰！"
            },
            "皮肤科": {
                icon: "🧏",
                title: "皮肤科",
                subtitle: "皮肤病·颜值守护",
                comment: "虽然手无缚鸡之力，但你的细心和审美让你成为皮肤科的理想人选！在这里，你会遇到各种'医生我这个痣是不是癌'的灵魂拷问...记得保持微笑！"
            },
            "耳鼻喉科": {
                icon: "👂",
                title: "耳鼻喉科",
                subtitle: "五官全能·空间想象",
                comment: "热情张扬的你能说会道，非常适合耳鼻喉科！这里的器官弯弯曲曲、奇形怪状，需要丰富的空间想象力。你的沟通能力也能让紧张的患者放松下来！"
            },
            "眼科": {
                icon: "👁️",
                title: "眼科",
                subtitle: "光明使者·精细操作",
                comment: "深邃神秘的你和眼科简直绝配！在眼球上做手术需要绝对的精准和稳定，你的性格完美契合。顺便说一下，这个科室夜班相对少哦！"
            },
            "泌尿外科": {
                icon: "💧",
                title: "泌尿外科",
                subtitle: "泌尿专家·液体平衡",
                comment: "活力满满的你非常适合节奏快的泌尿外科！这里的手术时间相对可控，工作强度也比其他外科科室友好一些。是个不错的性价比之选！"
            },
            "影像科": {
                icon: "🌑",
                title: "影像科",
                subtitle: "读片专家·暗室居民",
                comment: "喜欢黑暗的你简直是影像科的完美人选！整天窝在昏暗的读片室里，和黑白灰的CT/MRI打交道。没有急诊的惊心动魄，只有日复一日的平静...完美！"
            },
            "检验科": {
                icon: "🔬",
                title: "检验科",
                subtitle: "实验达人·数据分析",
                comment: "喜欢明亮环境的你非常适合检验科！这里的灯永远亮着，各种仪器嗡嗡作响。你每天的工作就是和血液、尿液、粪便打交道...别吐，加油！"
            },
            "麻醉科": {
                icon: "😴",
                title: "麻醉科",
                subtitle: "睡眠创造·监护守护",
                comment: "站着都能睡着的你，简直是麻醉科的梦中情医！这份工作需要你在手术过程中保持高度警惕（但不能睡着），还要有快速入睡、快速清醒的绝技。你全都会！"
            },
            "病理科": {
                icon: "🔪",
                title: "病理科",
                subtitle: "终极审判·沉默巨人",
                comment: "研究死亡的你内心足够强大！病理科医生被称为'医生的医生'，你的诊断决定了一个家庭的后续治疗方向。虽然不直接接触患者，但你的责任比山还重！"
            },
            "神经内科": {
                icon: "🧠",
                title: "神经内科",
                subtitle: "脑沟探索·定位诊断",
                comment: "对迟钝有独特包容的你非常适合神经内科！这里的患者症状复杂多样，需要你有足够的耐心去推理、去排查。恭喜你，已经掌握了医学的'玄学'！"
            },
            "康复医学科": {
                icon: "💪",
                title: "康复医学科",
                subtitle: "希望播种·长期陪伴",
                comment: "敏感细腻的你非常适合康复医学！这里需要你关注患者的每一个细微进步，给予他们持续的希望和鼓励。你的存在，就是患者康复路上的光！"
            }
        };

        let currentQuestion = 0;
        let history = [];

        function renderCard(content) {
            const card = document.getElementById('card');
            card.classList.remove('show');
            card.classList.add('hide');
            
            setTimeout(() => {
                card.innerHTML = content;
                card.classList.remove('hide');
                card.classList.add('show');
            }, 300);
        }

        function renderStart() {
            const content = `
                <div class="icon">🏥</div>
                <h1>海鸭蛋科室契合度测试</h1>
                <p class="subtitle">
                    还在纠结选哪个科？<br>
                    做完这个测试，也许你就明白了！<br>
                    <small>（仅供参考，别投简历）</small>
                </p>
                <button class="action-btn" onclick="startTest()">我要进科室！</button>
                <p class="footer">不作为任何招生依据</p>
            `;
            renderCard(content);
        }

        function renderQuestion(id) {
            const q = questions.find(item => item.id === id);
            if (!q) return;

            const totalSteps = 6;
            const progress = Math.min((currentQuestion / totalSteps) * 100, 100);

            let optionsHtml = q.options.map(opt => {
                const nextVal = typeof opt.next === 'string' ? `'${opt.next}'` : opt.next;
                return `<button class="option-btn" onclick="selectOption(${nextVal})">${opt.text}</button>`;
            }).join('');

            const content = `
                <div class="progress">
                    <div class="progress-bar" style="width: ${progress}%"></div>
                </div>
                <div class="icon">${q.icon}</div>
                <p class="question">${q.question}</p>
                <div class="options">${optionsHtml}</div>
            `;
            renderCard(content);
        }

        function renderResult(department) {
            const result = results[department];
            if (!result) return;

            currentQuestion = 0;
            history = [];

            const content = `
                <div class="result-icon celebrate">${result.icon}</div>
                <h1 class="result-title">你的命中注定科室是</h1>
                <div class="result-subtitle">${result.title}</div>
                <div class="result-comment">${result.comment}</div>
                <button class="action-btn" onclick="restartTest()">🔄 再测一次</button>
                <p class="footer">结果仅供参考，人生自己掌控<br>先期末别挂再说吧</p>
            `;
            renderCard(content);
        }

        function startTest() {
            currentQuestion = 1;
            history = [];
            renderQuestion(1);
        }

        function selectOption(next) {
            history.push(currentQuestion);
            currentQuestion++;

            if (typeof next === 'number') {
                renderQuestion(next);
            } else if (typeof next === 'string') {
                renderResult(next);
            }
        }

        function restartTest() {
            currentQuestion = 0;
            history = [];
            renderStart();
        }

        // 初始化
        renderStart();
    </script>
</body>
</html>

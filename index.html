        function renderQuestion() {
            const qContainer = document.getElementById("questions");
            qContainer.innerHTML = "";
            const q = questions[currentQuestion];
            const html = `
                <div class="dimension">
                    <h2>第 ${currentQuestion + 1} 题 / 24</h2>
                    <div class="question">
                        <label>${q.q}</label>
                        <div class="options" id="options-${q.id}">

                                <div class="option ${answers[q.id-1] === score ? 'selected' : ''}" 
                                     onclick="selectAnswer(${q.id}, ${score});">
                                    ${score} 分 —— ${["完全不符合","较不符合","一般符合","比较符合","完全符合"][score-1]}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            qContainer.innerHTML = html;
            document.getElementById("prev-btn").style.display = currentQuestion === 0 ? "none" : "inline-block";
            document.getElementById("next-btn").style.display = currentQuestion === 23 ? "none" : "inline-block";

            document.getElementById("progress-bar").style.width = `${progress}%`;
            document.getElementById("progress-text").textContent = currentQuestion + 1;
        }

        function selectAnswer(qid, score) {
            answers[qid - 1] = score;
            const options = document.querySelectorAll(`#options-${qid} .option`);
            options.forEach(opt => opt.classList.remove("selected"));
            event.currentTarget.classList.add("selected");
            setTimeout(() => {
                if (currentQuestion < 23) {
                    currentQuestion++;
                    renderQuestion();
                } else {
                    calculateResult();
                }
            }, 150);
        }

        function nextQuestion() {
            if (currentQuestion < 23) {
                currentQuestion++;
                renderQuestion();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }

        function calculateScores() {
            const scores = { DER:0, EHC:0, PDO:0, SHT:0, ALR:0, CSI:0 };
            questions.forEach((q, index) => scores[q.dim] += answers[index]);
            return scores;
        }

        function euclideanDistance(user, dept) {
            return Math.sqrt(
                Math.pow(user.DER - dept.der, 2) + Math.pow(user.EHC - dept.ehc, 2) +
                Math.pow(user.PDO - dept.pdo, 2) + Math.pow(user.SHT - dept.sht, 2) +
                Math.pow(user.ALR - dept.alr, 2) + Math.pow(user.CSI - dept.csi, 2)
            );
        }

        function calculateResult() {
            if (answers.includes(0)) {
                alert("请完成所有题目！");
                return;
            }
            const userScores = calculateScores();
            const results = departments.map(dept => ({
                ...dept, distance: euclideanDistance(userScores, dept)
            })).sort((a, b) => a.distance - b.distance);

            document.getElementById("test-page").classList.remove("active");
            document.getElementById("result-page").classList.add("active");

            let scoreHTML = "";
            Object.keys(userScores).forEach(dim => {
                scoreHTML += `
                    <tr>
                        <td><strong>${dimNames[dim]}</strong></td>
                        <td style="font-size:24px; font-weight:bold; color:#1565c0;">${userScores[dim]}</td>
                        <td>满分20分</td>
                    </tr>`;
            });
            document.querySelector("#score-table tbody").innerHTML = scoreHTML;

            let recHTML = "";
            for (let i = 0; i < 3; i++) {
                const r = results[i];
                recHTML += `
                    <div class="recommend">
                        <h3 class="dept-name">🥇 第 ${i+1} 推荐：${r.name} (${r.abbr})</h3>
                        <p class="distance">匹配距离：${r.distance.toFixed(2)}</p>
                        <p class="dept-desc"><strong>科室简介：</strong>${r.desc}</p>
                        <p class="dept-suitable"><strong>适合人群：</strong>${r.suitable}</p>
                    </div>`;
            }
            document.getElementById("recommendations").innerHTML = recHTML;

            const typeDesc = (userScores.DER >14 && userScores.SHT>14) ? "高决断高抗压型" :
                             (userScores.EHC>15 && userScores.CSI>15) ? "高共情高沟通型" : "均衡发展型";
            document.getElementById("score-summary").innerHTML = 
                `<p>您的性格画像偏向<strong>${typeDesc}</strong>，以下为最优匹配科室。</p>`;
        }

        function restartTest() {
            answers = new Array(24).fill(0);
            currentQuestion = 0;
            document.getElementById("result-page").classList.remove("active");
            document.getElementById("welcome-page").classList.add("active");
        }
    </script>
</body>
</html>
